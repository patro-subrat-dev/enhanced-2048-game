<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2048</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>2048</h1>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">SCORE</div>
                    <div class="score" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">BEST</div>
                    <div class="score" id="best">0</div>
                </div>
            </div>
            <div class="controls">
                <button class="undo-button" id="undo-button" title="Undo (Ctrl+Z)">↶</button>
            </div>
        </header>
        
        <main>
            <div class="game-container">
                <div class="grid-container" id="grid-container">
                    <div class="grid-row">
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                    </div>
                    <div class="grid-row">
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                    </div>
                    <div class="grid-row">
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                    </div>
                    <div class="grid-row">
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                    </div>
                </div>
                <div class="tile-container" id="tile-container"></div>
                <div class="game-message" id="game-message">
                    <p></p>
                    <div class="game-buttons">
                        <button class="retry-button">Try again</button>
                    </div>
                </div>
            </div>
            
            <div class="game-explanation">
                <p><strong>HOW TO PLAY:</strong> Use arrow keys to move tiles. When two tiles with the same number touch, they merge into one!</p>
                <p>Join the tiles, get to 2048!</p>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
